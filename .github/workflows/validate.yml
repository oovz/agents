name: Validate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  repository:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Validate manifests and adapters
        run: npm run validate
